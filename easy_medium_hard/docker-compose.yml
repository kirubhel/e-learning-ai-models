services:
  letter-arrangement-ai:
    build: .
    container_name: letter-arrangement-ai
    restart: unless-stopped
    ports:
      - "9014:9014"
    environment:
      - PORT=9014
      - HOST=0.0.0.0
    networks:
      - elearning-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9014/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  elearning-network:
    external: true
    name: e-learning_elearning-network

