<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letter Arrangement AI Model - Level Predictor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #2563eb;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 12px;
            display: none;
        }

        .result.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result.success {
            background: #d4edda;
            border: 2px solid #c3e6cb;
            color: #155724;
        }

        .result.error {
            background: #f8d7da;
            border: 2px solid #f5c6cb;
            color: #721c24;
        }

        .result-title {
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .result-content {
            margin-top: 15px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-label {
            font-weight: 600;
        }

        .result-value {
            color: #2563eb;
            font-weight: 600;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2563eb;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }

        .status-high {
            background: #28a745;
            color: white;
        }

        .status-medium {
            background: #ffc107;
            color: #333;
        }

        .status-low {
            background: #dc3545;
            color: white;
        }

        .info-box {
            background: #dbeafe;
            border-left: 4px solid #2563eb;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .info-box p {
            margin: 0;
            color: #004085;
            font-size: 13px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Letter Arrangement AI</h1>
        <p class="subtitle">Predict Student Difficulty Level</p>

        <div class="info-box">
            <p><strong>How it works:</strong> Enter student progress data to get an AI-powered difficulty level recommendation. The model analyzes time spent, retries, and average score to predict the optimal difficulty level.</p>
        </div>

        <form id="predictionForm">
            <div class="form-group">
                <label for="currentDifficulty">Current Difficulty Level</label>
                <select id="currentDifficulty" name="currentDifficulty" required>
                    <option value="">Select difficulty...</option>
                    <option value="easy">Easy</option>
                    <option value="medium">Medium</option>
                    <option value="hard">Hard</option>
                </select>
            </div>

            <div class="form-group">
                <label for="timeSpent">Time Spent (seconds)</label>
                <input type="number" id="timeSpent" name="timeSpent" min="0" placeholder="e.g., 120" required>
            </div>

            <div class="form-group">
                <label for="retries">Number of Retries</label>
                <input type="number" id="retries" name="retries" min="0" placeholder="e.g., 2" required>
            </div>

            <div class="form-group">
                <label for="avgScore">Average Score per Question</label>
                <input type="number" id="avgScore" name="avgScore" min="0" max="10" step="0.01" placeholder="e.g., 7.5" required>
            </div>

            <button type="submit" class="btn" id="submitBtn">Predict Level</button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #666;">Analyzing student progress...</p>
        </div>

        <div class="result" id="result"></div>
    </div>

    <script>
        const form = document.getElementById('predictionForm');
        const submitBtn = document.getElementById('submitBtn');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Get form data
            const formData = {
                current_difficulty: document.getElementById('currentDifficulty').value,
                progress: {
                    time_spent: parseInt(document.getElementById('timeSpent').value),
                    retries: parseInt(document.getElementById('retries').value),
                    avg_score_per_question: parseFloat(document.getElementById('avgScore').value)
                }
            };

            // Show loading, hide result
            loading.classList.add('show');
            result.classList.remove('show');
            submitBtn.disabled = true;

            try {
                // Use the correct path - since we're at /ai-model, the API is at /ai-model/predict
                const apiPath = window.location.pathname.endsWith('/') 
                    ? window.location.pathname + 'predict' 
                    : window.location.pathname + '/predict';
                const response = await fetch(apiPath, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (response.ok) {
                    displayResult(data, true);
                } else {
                    displayResult({ error: data.error || 'An error occurred' }, false);
                }
            } catch (error) {
                displayResult({ error: 'Failed to connect to AI service: ' + error.message }, false);
            } finally {
                loading.classList.remove('show');
                submitBtn.disabled = false;
            }
        });

        function displayResult(data, success) {
            result.className = 'result ' + (success ? 'success' : 'error');
            
            if (success) {
                const level = data.predicted_player_level || data.recommended_level || 'N/A';
                const levelClass = level === 'high' ? 'status-high' : 
                                  level === 'medium' ? 'status-medium' : 'status-low';
                
                result.innerHTML = `
                    <div class="result-title">
                        ✅ Prediction Result
                        <span class="status-badge ${levelClass}">${level.toUpperCase()}</span>
                    </div>
                    <div class="result-content">
                        <div class="result-item">
                            <span class="result-label">Predicted Level:</span>
                            <span class="result-value">${level}</span>
                        </div>
                        <div class="result-item">
                            <span class="result-label">Current Difficulty:</span>
                            <span class="result-value">${data.current_difficulty || 'N/A'}</span>
                        </div>
                        <div class="result-item">
                            <span class="result-label">Time Spent:</span>
                            <span class="result-value">${data.progress?.time_spent || 'N/A'} seconds</span>
                        </div>
                        <div class="result-item">
                            <span class="result-label">Retries:</span>
                            <span class="result-value">${data.progress?.retries || 'N/A'}</span>
                        </div>
                        <div class="result-item">
                            <span class="result-label">Avg Score/Question:</span>
                            <span class="result-value">${data.progress?.avg_score_per_question?.toFixed(2) || 'N/A'}</span>
                        </div>
                    </div>
                `;
            } else {
                result.innerHTML = `
                    <div class="result-title">❌ Error</div>
                    <div class="result-content">
                        <p>${data.error}</p>
                    </div>
                `;
            }

            result.classList.add('show');
        }
    </script>
</body>
</html>
