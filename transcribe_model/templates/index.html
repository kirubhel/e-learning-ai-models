<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Speech Lab - Learning Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --background: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--background);
            background-image:
                radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(16, 185, 129, 0.1) 0%, transparent 40%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #34d399);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 2rem;
            transition: transform 0.3s ease;
        }

        .input-group {
            margin-bottom: 2rem;
        }

        label {
            display: block;
            margin-bottom: 0.75rem;
            color: #cbd5e1;
            font-weight: 600;
            font-size: 1.1rem;
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            color: white;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
            background: rgba(0, 0, 0, 0.3);
        }

        .recording-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            padding: 2rem;
            border: 2px dashed var(--glass-border);
            border-radius: 20px;
            margin-bottom: 2rem;
        }

        .record-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background: var(--danger);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .record-btn::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid var(--danger);
            opacity: 0;
            transition: all 0.3s;
        }

        .record-btn.active {
            transform: scale(0.9);
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.4);
            animation: pulse 1.5s infinite;
        }

        .record-btn.active::after {
            animation: ripple 1.5s infinite;
        }

        .record-btn svg {
            width: 32px;
            height: 32px;
            fill: currentColor;
        }

        .action-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.4);
        }

        .btn-secondary {
            background: var(--glass);
            color: white;
            border: 1px solid var(--glass-border);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #results {
            animation: fadeInUp 0.5s ease-out;
        }

        .score-card {
            text-align: center;
            margin-bottom: 2rem;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 8px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 3rem;
            font-weight: 700;
            position: relative;
        }

        .score-circle span {
            font-size: 1rem;
            opacity: 0.7;
            margin-left: 2px;
        }

        .feedback-box {
            background: rgba(99, 102, 241, 0.1);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            font-size: 1.2rem;
            border: 1px solid rgba(99, 102, 241, 0.2);
            margin-bottom: 2rem;
        }

        .detials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 1rem;
        }

        .phoneme-pill {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 1rem;
            border-radius: 16px;
            text-align: center;
        }

        .phoneme-char {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: block;
        }

        .phoneme-score {
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
        }

        .green {
            background: var(--secondary);
            box-shadow: 0 0 10px var(--secondary);
        }

        .yellow {
            background: var(--warning);
            box-shadow: 0 0 10px var(--warning);
        }

        .red {
            background: var(--danger);
            box-shadow: 0 0 10px var(--danger);
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes ripple {
            0% {
                transform: scale(1);
                opacity: 0.5;
            }

            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .audio-preview {
            width: 100%;
            margin-top: 1rem;
            filter: invert(100%) hue-rotate(180deg) brightness(1.5);
            height: 40px;
        }

        #visualizer {
            width: 100%;
            height: 60px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>AI Speech Lab</h1>
            <p class="subtitle">Real-time Pronunciation Evaluation Service</p>
        </header>

        <main>
            <div class="glass-card">
                <div class="input-group">
                    <label for="targetWord">Target Word</label>
                    <input type="text" id="targetWord" placeholder="Enter word to practice (e.g. Apple)" value="Apple">
                </div>

                <div class="recording-zone">
                    <p id="recordStatus">Tap to start recording</p>
                    <button id="recordBtn" class="record-btn">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z" />
                            <path
                                d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" />
                        </svg>
                    </button>
                    <canvas id="visualizer"></canvas>
                    <audio id="audioPlayback" class="audio-preview hidden" controls></audio>
                </div>

                <div class="action-btns">
                    <button id="resetBtn" class="btn btn-secondary">Clear</button>
                    <button id="analyzeBtn" class="btn btn-primary" disabled>Analyze Speech</button>
                </div>
            </div>

            <div id="results" class="glass-card hidden">
                <div class="score-card">
                    <div id="scoreCircle" class="score-circle">0<span>/100</span></div>
                    <h2 id="resultWord">Word</h2>
                </div>

                <div id="feedback" class="feedback-box">
                    Feedback will appear here.
                </div>

                <div class="input-group">
                    <label>Phonetic Breakdown</label>
                    <div id="details" class="detials-grid">
                        <!-- Phonemes injected here -->
                    </div>
                </div>

                <div class="input-group" style="margin-top: 2rem;">
                    <label>Detection Info</label>
                    <div style="font-size: 0.9rem; color: #94a3b8; display: flex; flex-direction: column; gap: 0.5rem;">
                        <p>Whisper Detected: <span id="whisperDetected" style="color: white; font-weight: 600;">-</span>
                        </p>
                        <p>Target IPA: <span id="targetIpa" style="color: white; font-weight: 600;">-</span></p>
                        <p>User IPA: <span id="userIpa" style="color: white; font-weight: 600;">-</span></p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        let audioBlob;
        let stream;
        let animationId;

        const recordBtn = document.getElementById('recordBtn');
        const recordStatus = document.getElementById('recordStatus');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const resetBtn = document.getElementById('resetBtn');
        const audioPlayback = document.getElementById('audioPlayback');
        const visualizer = document.getElementById('visualizer');
        const canvasCtx = visualizer.getContext('2d');

        async function startRecording() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert('Microphone access is restricted on insecure origins (HTTP). Please use HTTPS or access via localhost. If testing, you can enable "Insecure origins treated as secure" in your browser flags.');
                return;
            }

            try {
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    audioPlayback.src = audioUrl;
                    audioPlayback.classList.remove('hidden');
                    analyzeBtn.disabled = false;
                };

                mediaRecorder.start();
                recordBtn.classList.add('active');
                recordStatus.innerText = 'Recording... Tap to stop';
                startVisualizer(stream);
            } catch (err) {
                alert('Could not access microphone: ' + err.message);
            }
        }

        function stopRecording() {
            mediaRecorder.stop();
            stream.getTracks().forEach(track => track.stop());
            recordBtn.classList.remove('active');
            recordStatus.innerText = 'Recording saved';
            cancelAnimationFrame(animationId);
        }

        recordBtn.onclick = async () => {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                stopRecording();
            } else {
                await startRecording();
            }
        };

        analyzeBtn.onclick = async () => {
            const word = document.getElementById('targetWord').value;
            if (!word) {
                alert('Please enter a target word');
                return;
            }

            analyzeBtn.disabled = true;
            analyzeBtn.textContent = 'Analyzing...';

            const formData = new FormData();
            formData.append('audio_file', audioBlob, 'recording.wav');
            formData.append('target_word', word);

            try {
                const response = await fetch('evaluate', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('Evaluation failed');

                const data = await response.json();
                displayResults(data);
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                analyzeBtn.disabled = false;
                analyzeBtn.textContent = 'Analyze Speech';
            }
        };

        resetBtn.onclick = () => {
            audioChunks = [];
            audioBlob = null;
            audioPlayback.classList.add('hidden');
            document.getElementById('results').classList.add('hidden');
            analyzeBtn.disabled = true;
            recordStatus.innerText = 'Tap to start recording';
        };

        function displayResults(data) {
            const results = document.getElementById('results');
            results.classList.remove('hidden');

            document.getElementById('scoreCircle').firstChild.textContent = data.overall_score;
            
            const word = document.getElementById('targetWord').value;
            document.getElementById('resultWord').innerText = data.input_type.toUpperCase();
            
            if (data.details && data.details.length > 0) {
                document.getElementById('feedback').innerText = data.details[0].feedback;
                document.getElementById('whisperDetected').innerText = data.debug?.full_heard_text || data.details[0].debug_heard || '-';
            } else {
                document.getElementById('feedback').innerText = "Evaluation completed.";
                document.getElementById('whisperDetected').innerText = data.debug?.full_heard_text || '-';
            }

            const details = document.getElementById('details');
            details.innerHTML = '';
            
            // Adjust grid for segments
            details.style.display = 'flex';
            details.style.flexDirection = 'column';

            if (data.details && Array.isArray(data.details)) {
                data.details.forEach(item => {
                    const pill = document.createElement('div');
                    pill.className = 'phoneme-pill';
                    pill.style.marginBottom = '1rem';
                    pill.style.textAlign = 'left';

                    let colorClass = 'red';
                    if (item.status === 'excellent') colorClass = 'green';
                    if (item.status === 'needs_practice' && item.score > 40) colorClass = 'yellow';

                    pill.innerHTML = `
                        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <span class="phoneme-char" style="font-size: 1.1rem; margin-bottom: 0;">${item.target}</span>
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    <span class="color-dot ${colorClass}"></span>
                                    <span class="phoneme-score">${item.score}%</span>
                                </div>
                            </div>
                            <p style="font-size: 0.9rem; color: #94a3b8; font-style: italic;">Heard: "${item.debug_heard || '(unclear)'}"</p>
                            <p style="font-size: 0.95rem; color: #cbd5e1;">${item.feedback}</p>
                        </div>
                    `;
                    details.appendChild(pill);
                });
            }

            const scoreColor = data.overall_score > 80 ? '#10b981' : (data.overall_score > 40 ? '#f59e0b' : '#ef4444');
            document.getElementById('scoreCircle').style.borderColor = scoreColor;
            document.getElementById('scoreCircle').style.color = scoreColor;

            results.scrollIntoView({ behavior: 'smooth' });
        }

        function startVisualizer(stream) {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaStreamSource(stream);
            const analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            source.connect(analyser);

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function draw() {
                animationId = requestAnimationFrame(draw);
                analyser.getByteFrequencyData(dataArray);

                canvasCtx.fillStyle = 'rgba(15, 23, 42, 0.5)';
                canvasCtx.fillRect(0, 0, visualizer.width, visualizer.height);

                const barWidth = (visualizer.width / bufferLength) * 2.5;
                let barHeight;
                let x = 0;

                for (let i = 0; i < bufferLength; i++) {
                    barHeight = dataArray[i] / 2;
                    canvasCtx.fillStyle = `rgb(99, 102, 241)`;
                    canvasCtx.fillRect(x, visualizer.height - barHeight, barWidth, barHeight);
                    x += barWidth + 1;
                }
            }
            draw();
        }
    </script>
</body>

</html>
